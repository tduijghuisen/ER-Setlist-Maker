<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#1A1612" />
<title>Setlist Maker · The Explosion Rockets</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bebas+Neue&family=Special+Elite&family=Limelight&display=swap" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root{
    --cream: #F4E8D0;
    --cream-lite: #FFFAEC;
    --cream-shadow: #E0D2B4;
    --red: #C2342A;
    --red-dark: #8C2820;
    --red-deep: #5E1A14;
    --ink: #1A1612;
    --ink-soft: #3A322A;
    --muted: #7A6E5C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);
    font-family:'Special Elite', 'Courier New', monospace;
    overscroll-behavior:none;
  }
  body{
    background-color:var(--cream);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(140,40,32,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(26,22,18,0.04) 0%, transparent 50%),
      radial-gradient(rgba(26,22,18,0.07) 1px, transparent 1px);
    background-size: auto, auto, 4px 4px;
    background-position: 0 0, 0 0, 0 0;
    min-height:100vh;
    min-height:100dvh;
  }
  /* ----- Typography ----- */
  .f-display{font-family:'Alfa Slab One', Georgia, serif; letter-spacing:0.01em; font-weight:400;}
  .f-poster{font-family:'Bebas Neue', Impact, sans-serif; letter-spacing:0.04em; font-weight:400;}
  .f-neon{font-family:'Limelight', Georgia, serif;}
  .f-type{font-family:'Special Elite', 'Courier New', monospace;}
  /* ----- App scaffolding ----- */
  #root{min-height:100vh; min-height:100dvh;}
  .app{max-width:680px; margin:0 auto; padding:0 0 120px 0;}
  /* ----- Header ----- */
  .hdr{
    position:sticky; top:0; z-index:30;
    background:var(--ink);
    color:var(--cream-lite);
    border-bottom:4px double var(--red);
    box-shadow:0 4px 0 rgba(26,22,18,0.15);
  }
  .hdr-row{display:flex; align-items:center; gap:10px; padding:10px 14px;}
  .hdr-mark{
    width:42px; height:42px; flex-shrink:0;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--red) 0%, var(--red-dark) 60%, var(--red-deep) 100%);
    border:2px solid var(--cream-lite);
    display:flex; align-items:center; justify-content:center;
    font-family:'Alfa Slab One', serif;
    color:var(--cream-lite);
    font-size:18px;
    box-shadow:0 0 0 2px var(--ink), 0 2px 0 var(--red-deep);
    transform:rotate(-6deg);
  }
  .hdr-title{
    font-family:'Alfa Slab One', serif;
    font-size:18px; line-height:1; letter-spacing:0.02em;
    color:var(--cream-lite);
    text-shadow: 1px 1px 0 var(--red-deep);
  }
  .hdr-sub{
    font-family:'Bebas Neue', sans-serif;
    font-size:11px; letter-spacing:0.18em;
    color:var(--red);
    margin-top:2px;
  }
  .hdr-zip{
    margin-left:auto; flex-shrink:0;
    font-family:'Bebas Neue', sans-serif;
    font-size:13px; letter-spacing:0.08em;
    padding:6px 9px; border-radius:3px;
    border:1.5px solid currentColor;
    background:rgba(244,232,208,0.06);
    cursor:pointer;
    white-space:nowrap;
  }
  .hdr-zip.ok{color:#9BE3B0; border-color:#9BE3B0;}
  .hdr-zip.warn{color:#F4A03C; border-color:#F4A03C; animation:pulse 2s ease-in-out infinite;}
  .hdr-zip.loading{color:var(--cream-lite); border-color:var(--cream-lite);}
  .hdr-zip.sync-off{color:#888; border-color:#888;}
  .hdr-zip.sync-ok{color:#9BE3B0; border-color:#9BE3B0;}
  .hdr-zip.sync-busy{color:#7FBEFD; border-color:#7FBEFD; animation:pulse 1.5s ease-in-out infinite;}
  .hdr-zip.sync-err{color:#FF6B5C; border-color:#FF6B5C; animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.55}}
  .hdr-tabs{display:flex; border-top:1px solid rgba(244,232,208,0.15);}
  .hdr-tab{
    flex:1; padding:12px 6px; border:none; background:transparent;
    color:var(--cream-lite); opacity:0.6;
    font-family:'Bebas Neue', sans-serif; font-size:15px; letter-spacing:0.12em;
    cursor:pointer; border-bottom:3px solid transparent;
    transition:opacity .15s, border-color .15s, background .15s;
  }
  .hdr-tab.active{opacity:1; border-bottom-color:var(--red); background:rgba(194,52,42,0.08);}
  .hdr-tab:active{background:rgba(194,52,42,0.18);}
  /* ----- Content ----- */
  .view{padding:18px 14px 28px;}
  .view h2{
    font-family:'Alfa Slab One', serif;
    font-size:28px; line-height:1.05; margin:0 0 4px 0;
    color:var(--ink);
  }
  .view-sub{
    font-family:'Bebas Neue', sans-serif;
    font-size:14px; letter-spacing:0.16em;
    color:var(--red-dark); margin-bottom:18px;
  }
  /* ----- Search / inputs ----- */
  .input{
    width:100%; display:block;
    background:var(--cream-lite);
    border:2px solid var(--ink);
    border-radius:2px;
    padding:11px 12px;
    font-family:'Special Elite', monospace; font-size:15px;
    color:var(--ink);
    box-shadow:3px 3px 0 var(--ink);
  }
  .input:focus{outline:none; border-color:var(--red); box-shadow:3px 3px 0 var(--red-dark);}
  .input-row{display:flex; gap:8px; margin-bottom:10px;}
  .input-row .input{flex:1; min-width:0;}
  label.field{display:block; margin-bottom:14px;}
  label.field > span{
    display:block;
    font-family:'Bebas Neue', sans-serif; font-size:13px; letter-spacing:0.16em;
    color:var(--red-dark); margin-bottom:5px;
  }
  /* ----- Buttons ----- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font-family:'Bebas Neue', sans-serif; font-size:16px; letter-spacing:0.1em;
    padding:11px 16px; border:2px solid var(--ink);
    background:var(--cream-lite); color:var(--ink);
    cursor:pointer; border-radius:2px;
    box-shadow:3px 3px 0 var(--ink);
    transition:transform .07s, box-shadow .07s;
  }
  .btn:active{transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink);}
  .btn-red{background:var(--red); color:var(--cream-lite); border-color:var(--ink);
    text-shadow:1px 1px 0 var(--red-deep);}
  .btn-red:hover{background:var(--red-dark);}
  .btn-ink{background:var(--ink); color:var(--cream-lite); border-color:var(--ink);}
  .btn-sm{padding:6px 10px; font-size:13px; box-shadow:2px 2px 0 var(--ink);}
  .btn-icon{padding:6px 8px; font-size:14px; min-width:32px;}
  .btn-block{width:100%;}
  .btn:disabled{opacity:0.5; cursor:not-allowed;}
  .btn-ghost{background:transparent; box-shadow:none; border-color:transparent;}
  /* ----- Cards ----- */
  .card{
    background:var(--cream-lite);
    border:2px solid var(--ink);
    border-radius:2px;
    padding:14px;
    box-shadow:4px 4px 0 var(--ink);
    margin-bottom:14px;
    position:relative;
  }
  .card-red{background:var(--red); color:var(--cream-lite);}
  /* ----- Song row ----- */
  .song-row{
    display:flex; align-items:center; gap:10px;
    padding:9px 10px;
    background:var(--cream-lite);
    border:1.5px solid var(--ink);
    margin-bottom:6px; border-radius:2px;
    box-shadow:2px 2px 0 rgba(26,22,18,0.6);
  }
  .song-row.selected{background:var(--red); color:var(--cream-lite); border-color:var(--ink);}
  .song-row.dim{opacity:0.5;}
  .song-num{
    flex-shrink:0; width:30px; height:30px; border-radius:50%;
    background:var(--ink); color:var(--cream-lite);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue', sans-serif; font-size:14px;
  }
  .song-row.selected .song-num{background:var(--cream-lite); color:var(--ink);}
  .song-info{flex:1; min-width:0;}
  .song-title{
    font-family:'Special Elite', monospace; font-size:15px;
    line-height:1.2; color:inherit; font-weight:bold;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .song-artist{
    font-family:'Bebas Neue', sans-serif; font-size:12px;
    letter-spacing:0.1em; color:var(--red-dark);
    opacity:0.95; margin-top:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .song-row.selected .song-artist{color:var(--cream-lite); opacity:0.8;}
  .song-actions{display:flex; flex-shrink:0; gap:4px; align-items:center;}
  /* ----- Setlist card ----- */
  .setlist-card{
    background:var(--cream-lite);
    border:2px solid var(--ink);
    padding:14px 16px;
    box-shadow:4px 4px 0 var(--ink);
    margin-bottom:14px;
    border-radius:2px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .setlist-card::before{
    content:''; position:absolute; top:-6px; left:-6px; right:-6px; height:8px;
    background:repeating-linear-gradient(45deg, var(--red) 0 6px, var(--ink) 6px 12px);
  }
  .sl-name{
    font-family:'Alfa Slab One', serif; font-size:20px; line-height:1.1;
    margin:6px 0 4px 0; color:var(--ink);
  }
  .sl-meta{
    font-family:'Bebas Neue', sans-serif; font-size:13px; letter-spacing:0.12em;
    color:var(--red-dark); margin-bottom:8px;
  }
  .sl-stats{
    font-family:'Special Elite', monospace; font-size:12px;
    color:var(--muted); display:flex; gap:14px;
  }
  /* ----- Set card ----- */
  .setcard{
    background:var(--cream-lite);
    border:2px solid var(--ink);
    box-shadow:4px 4px 0 var(--ink);
    margin-bottom:18px;
    border-radius:2px;
    overflow:hidden;
  }
  .setcard-hdr{
    background:var(--ink); color:var(--cream-lite);
    padding:10px 12px;
    display:flex; align-items:center; gap:10px;
    border-bottom:2px solid var(--red);
  }
  .setcard-name{
    font-family:'Alfa Slab One', serif; font-size:18px;
    flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis;
  }
  .setcard-name-input{
    flex:1; background:transparent; border:none; color:var(--cream-lite);
    font-family:'Alfa Slab One', serif; font-size:18px;
    padding:2px 4px; min-width:0;
  }
  .setcard-name-input:focus{outline:1px dashed var(--cream-lite); outline-offset:2px;}
  .setcard-body{padding:10px;}
  .setcard-empty{
    padding:18px 10px; text-align:center;
    font-family:'Bebas Neue', sans-serif; font-size:14px; letter-spacing:0.1em;
    color:var(--muted);
  }
  /* ----- Modal ----- */
  .modal-bg{
    position:fixed; inset:0; background:rgba(26,22,18,0.7);
    z-index:50; display:flex; align-items:flex-end; justify-content:center;
    animation:fadein .15s ease-out;
  }
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .modal{
    background:var(--cream);
    width:100%; max-width:680px; height:92vh; height:92dvh;
    border-top:4px solid var(--red);
    border-top-left-radius:14px; border-top-right-radius:14px;
    display:flex; flex-direction:column;
    animation:slideup .22s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-hdr{
    padding:10px 14px; border-bottom:2px solid var(--ink);
    display:flex; align-items:center; gap:10px;
    background:var(--cream);
  }
  .modal-title{
    font-family:'Alfa Slab One', serif; font-size:18px; flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .modal-body{flex:1; overflow-y:auto; padding:12px 14px;}
  .modal-foot{
    padding:10px 14px;
    border-top:2px solid var(--ink);
    background:var(--cream-lite);
    display:flex; gap:8px;
  }
  /* ----- Chips ----- */
  .chip-row{display:flex; gap:6px; flex-wrap:nowrap; overflow-x:auto; padding-bottom:6px; margin-bottom:10px; -webkit-overflow-scrolling:touch;}
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    font-family:'Bebas Neue', sans-serif; font-size:13px; letter-spacing:0.08em;
    padding:6px 11px; border:1.5px solid var(--ink);
    background:var(--cream-lite); color:var(--ink);
    border-radius:99px; cursor:pointer;
    white-space:nowrap;
  }
  .chip.active{background:var(--red); color:var(--cream-lite); border-color:var(--ink);}
  /* ----- Bottom action bar ----- */
  .action-bar{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--ink); border-top:3px solid var(--red);
    padding:10px 12px; padding-bottom:calc(10px + env(safe-area-inset-bottom));
    z-index:25;
    display:flex; gap:8px;
    max-width:680px; margin:0 auto;
  }
  .action-bar .btn{flex:1;}
  /* ----- Zip drop ----- */
  .zip-box{
    border:3px dashed var(--ink); background:var(--cream-lite);
    padding:22px 16px; text-align:center; border-radius:2px;
    box-shadow:4px 4px 0 var(--ink);
    cursor:pointer;
    transition:background .15s;
  }
  .zip-box.over{background:var(--red); color:var(--cream-lite); border-color:var(--cream-lite);}
  .zip-box-title{font-family:'Alfa Slab One', serif; font-size:20px; margin-bottom:6px;}
  .zip-box-sub{font-family:'Bebas Neue', sans-serif; letter-spacing:0.1em; font-size:13px;}
  /* ----- Toast ----- */
  .toast{
    position:fixed; left:50%; bottom:90px; transform:translateX(-50%);
    background:var(--ink); color:var(--cream-lite);
    padding:10px 18px; border:2px solid var(--red);
    font-family:'Bebas Neue', sans-serif; letter-spacing:0.1em;
    z-index:99; box-shadow:3px 3px 0 var(--red-dark);
    animation:slideup .18s ease-out;
    max-width:90%; text-align:center;
  }
  /* ----- Misc ----- */
  .divider-stars{
    text-align:center; font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.6em; color:var(--red); font-size:16px;
    margin:18px 0 14px 0;
  }
  .empty-state{
    text-align:center; padding:36px 16px; color:var(--muted);
  }
  .empty-state-title{
    font-family:'Alfa Slab One', serif; font-size:22px; color:var(--ink);
    margin-bottom:8px;
  }
  .danger-text{color:var(--red-dark);}
  .ticket-tag{
    display:inline-block; padding:3px 9px;
    background:var(--ink); color:var(--cream-lite);
    font-family:'Bebas Neue', sans-serif; letter-spacing:0.12em; font-size:12px;
    border-radius:2px;
  }
  .custom-badge{
    display:inline-block; margin-left:6px;
    padding:1px 6px; vertical-align:middle;
    background:var(--red); color:var(--cream-lite);
    font-family:'Bebas Neue', sans-serif; letter-spacing:0.1em; font-size:10px;
    border-radius:2px; transform:translateY(-1px);
  }
  .song-row.selected .custom-badge{background:var(--cream-lite); color:var(--red-dark);}
  .no-pdf-tag{
    display:inline-block; margin-left:6px;
    font-family:'Bebas Neue', sans-serif; letter-spacing:0.08em; font-size:10px;
    color:var(--muted); opacity:0.85;
  }
  .song-row.selected .no-pdf-tag{color:var(--cream-lite); opacity:0.7;}
  .pdf-result{
    background: var(--cream-lite);
    border-top: 8px solid var(--red);
    box-shadow: 4px 4px 0 var(--ink);
    animation: slidein .25s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes slidein{from{transform:translateY(-8px); opacity:0} to{transform:translateY(0); opacity:1}}
  .pdf-result a.btn{display:inline-flex; align-items:center; justify-content:center;}
  .preview-warning{
    background:#FFE7B3; color:#5E1A14;
    border-bottom:2px solid var(--red);
    border-top:1px solid var(--red-deep);
    padding:10px 14px;
    box-shadow:0 3px 0 rgba(94,26,20,0.15);
  }
  .preview-warning-title{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:0.14em; font-size:13px;
    color:var(--red-deep);
    margin-bottom:2px;
  }
  .preview-warning-text{
    font-family:'Special Elite', monospace;
    font-size:13px; line-height:1.45;
    color:var(--ink);
  }
  .progress{
    height:8px; background:var(--cream-shadow);
    border:1.5px solid var(--ink); overflow:hidden;
    margin-top:10px;
  }
  .progress-bar{
    height:100%; background:var(--red);
    transition:width .2s;
  }
  /* hide arrows on number inputs */
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.2) sepia(1) hue-rotate(330deg) saturate(3);}
</style>
</head>

<div id="root"></div>

const months = [‘JAN’,‘FEB’,‘MRT’,‘APR’,‘MEI’,‘JUN’,‘JUL’,‘AUG’,‘SEP’,‘OKT’,‘NOV’,‘DEC’];
return dd + ’ ’ + months[d.getMonth()] + ’ ’ + d.getFullYear();
}catch(e){return iso;}
}
function fmtDateShort(iso){
if(!iso) return ‘’;
try{
const d = new Date(iso + ‘T00:00:00’);
return String(d.getDate()).padStart(2,‘0’) + ‘-’ + String(d.getMonth()+1).padStart(2,‘0’) + ‘-’ + d.getFullYear();
}catch(e){return iso;}
}
function sanitizeForPdf(text){
// pdf-lib StandardFonts only support WinAnsi. Replace fancy chars; strip anything else.
if(!text) return ‘’;
return text
.replace(/[\u2018\u2019\u201A\u201B]/g, “’”)
.replace(/[\u201C\u201D\u201E\u201F]/g, ‘”’)
.replace(/[\u2013\u2014\u2015]/g, ‘-’)
.replace(/\u2026/g, ‘…’)
.split(’’)
.map(c => c.charCodeAt(0) > 0xFF ? ‘?’ : c)
.join(’’);
}

/* ===== Storage ===== */
const CUSTOM_SONGS_KEY = ‘custom_songs_v1’;
const SONG_OVERRIDES_KEY = ‘song_overrides_v1’;

// One-time storage availability check. In Claude artifact preview the window.storage
// API often throws “Invalid response format” — we detect this and either fall back
// to localStorage (when self-hosted) or skip all storage ops silently.
let storageTestPromise = null;
let storageBackend = ‘none’; // ‘claude’ | ‘local’ | ‘none’

function makeLocalStorageBackend(){
return {
get: async (key) => {
try{
const v = localStorage.getItem(key);
return v === null ? null : {key, value: v, shared: false};
}catch(e){ return null; }
},
set: async (key, value) => {
localStorage.setItem(key, String(value));
return {key, value: String(value), shared: false};
},
delete: async (key) => {
localStorage.removeItem(key);
return {key, deleted: true, shared: false};
},
list: async (prefix) => {
const keys = [];
for(let i=0; i<localStorage.length; i++){
const k = localStorage.key(i);
if(!prefix || (k && k.startsWith(prefix))) keys.push(k);
}
return {keys, prefix};
}
};
}

function testStorageOnce(){
if(storageTestPromise) return storageTestPromise;
storageTestPromise = (async () => {
// 1) Try Claude.ai window.storage (artifacts environment)
if(window.storage){
try{
const testKey = ‘_*storage_probe*’ + Date.now();
await window.storage.set(testKey, ‘1’);
const r = await window.storage.get(testKey);
try{ await window.storage.delete(testKey); }catch(e){}
if(r && r.value === ‘1’){
storageBackend = ‘claude’;
return true;
}
}catch(e){ /* fall through */ }
}
// 2) Fall back to localStorage (self-hosted / outside Claude artifacts)
try{
if(typeof localStorage !== ‘undefined’){
const testKey = ‘_*storage_probe_local*’ + Date.now();
localStorage.setItem(testKey, ‘1’);
const v = localStorage.getItem(testKey);
localStorage.removeItem(testKey);
if(v === ‘1’){
window.storage = makeLocalStorageBackend();
storageBackend = ‘local’;
return true;
}
}
}catch(e){}
storageBackend = ‘none’;
return false;
})();
return storageTestPromise;
}
function getStorageBackend(){ return storageBackend; }

function base64ToBytes(b64){
const bin = atob(b64);
const bytes = new Uint8Array(bin.length);
for(let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
return bytes;
}
function bytesToBase64(bytes){
let bin = ‘’;
const chunk = 0x8000;
for(let i=0; i<bytes.length; i+=chunk){
bin += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
}
return btoa(bin);
}

async function pullFromJsonBin(binId, accessKey){
const url = JSONBIN_BASE + ‘/’ + encodeURIComponent(binId) + ‘/latest’;
const r = await fetch(url, {
method: ‘GET’,
headers: {
‘X-Access-Key’: accessKey,
‘X-Bin-Meta’: ‘false’
}
});
if(!r.ok){
let detail = ‘’;
try{ const j = await r.json(); detail = j && j.message ? j.message : ‘’; }catch(e){}
throw new Error(’Cloud lezen mislukt (HTTP ’ + r.status + ‘)’ + (detail ? ’: ’ + detail : ‘’));
}
return await r.json();
}
async function pushToJsonBin(binId, accessKey, data){
const url = JSONBIN_BASE + ‘/’ + encodeURIComponent(binId);
const r = await fetch(url, {
method: ‘PUT’,
headers: {
‘Content-Type’: ‘application/json’,
‘X-Access-Key’: accessKey
},
body: JSON.stringify(data)
});
if(!r.ok){
let detail = ‘’;
try{ const j = await r.json(); detail = j && j.message ? j.message : ‘’; }catch(e){}
throw new Error(’Cloud schrijven mislukt (HTTP ’ + r.status + ‘)’ + (detail ? ’: ’ + detail : ‘’));
}
return await r.json();
}

function makeSyncPayload(setlists, customSongs, songOverrides){

v: SYNC_SCHEMA_VERSION,
updatedAt: Date.now(),
setlists: setlists || [],
customSongs: (customSongs || []).map(s => ({
id: s.id, filename: s.filename, title: s.title, artist: s.artist,
custom: true, hasPdf: s.hasPdf !== false, addedAt: s.addedAt
})),
songOverrides: songOverrides || {deleted: [], edits: {}}
};
}
function isValidPayload(p){
return p && typeof p === ‘object’ && p.v === SYNC_SCHEMA_VERSION &&
Array.isArray(p.setlists) && Array.isArray(p.customSongs) &&
p.songOverrides && Array.isArray(p.songOverrides.deleted);
}
function syncHash(payload){
// Quick crude hash for “did anything change” comparison
try{
const s = JSON.stringify({s: payload.setlists, c: payload.customSongs, o: payload.songOverrides});
let h = 0; for(let i=0; i<s.length; i++){ h = ((h<<5) - h + s.charCodeAt(i)) | 0; }
return h + ‘:’ + s.length;
}catch(e){ return Math.random().toString(); }
}

if(!binId.trim() || !accessKey.trim()){
setErr(‘Vul Bin ID en Access Key in.’);

const key = isBaked ? config.accessKey : accessKey.trim();
if(!bid || !key) return;
const s = bid + ‘|’ + key;

showToast && showToast(‘Gekopieerd ✓’, 1800);
}catch(e){
showToast && showToast(‘Kopiëren mislukt’, 2200);
}
}
function pasteShareString(){
try{
navigator.clipboard.readText().then(txt => {
const m = (txt || ‘’).split(’|’);
if(m.length === 2){
setBinId(m[0].trim());
setAccessKey(m[1].trim());
showToast && showToast(‘Geplakt ✓’, 1600);
} else {

}
});

function fmtSyncTime(t){
if(!t) return ‘nog niet’;
const d = new Date(t);
const diff = (Date.now() - t) / 1000;
if(diff < 60) return ‘zojuist’;
if(diff < 3600) return Math.floor(diff/60) + ’ min geleden’;
if(diff < 86400) return Math.floor(diff/3600) + ’ uur geleden’;
return d.toLocaleDateString(‘nl-NL’);
}

function AddSongModal({editing, onClose, onSave}){
const [title, setTitle] = useState(editing ? editing.title : ‘’);

const [busy, setBusy] = useState(false);
const [err, setErr] = useState(’’);
const fileRef = useRef(null);

async function handleFile(file){
if(!file) return;
if(!/.pdf$/i.test(file.name)){
setErr(‘Alleen PDF-bestanden zijn toegestaan.’); return;
}
if(file.size > 4 * 1024 * 1024){
setErr(‘PDF is groter dan 4MB. Verklein de PDF of voeg hem toe aan je Archief.zip.’);
return;
}
try{
const ab = await file.arrayBuffer();
setPdfBytes(new Uint8Array(ab));
setPdfName(file.name);
setErr(’’);
}catch(e){
setErr(‘Kon bestand niet lezen: ’ + (e.message||e));
}
}
async function save(){
if(!title.trim()){ setErr(‘Vul een titel in.’); return; }
if(!artist.trim()){ setErr(‘Vul een artiest in.’); return; }
setBusy(true);
setErr(’’);
try{
await onSave({
title: title.trim(),
artist: artist.trim(),
pdfBytes: pdfBytes,
editing: editing
});
}catch(e){
console.error(e);
setErr(’Opslaan mislukt: ’ + (e.message || e));
setBusy(false);
}
}
const isBuiltinEdit = editing && !editing.custom;
const hasExistingPdf = editing && editing.custom && editing.hasPdf !== false;
return (
<div className=“modal-bg” onClick={busy ? undefined : onClose}>
<div className=“modal” style={{height:‘auto’, maxHeight:‘92vh’}} onClick={e=>e.stopPropagation()}>
<div className="modal-hdr">

</div>
<div className="modal-body">

<input className=“input” value={title} onChange={e=>setTitle(e.target.value)}
placeholder=“Bijv. Heartbreak Hotel” />
</label>
<label className="field">
<span>ARTIEST</span>
<input className=“input” value={artist} onChange={e=>setArtist(e.target.value)}
placeholder=“Bijv. Elvis Presley” />
</label>
{!isBuiltinEdit && (

<span>PDF BLADMUZIEK (OPTIONEEL)</span>
<button className=“btn btn-block” onClick={()=>fileRef.current && fileRef.current.click()}
style={{textAlign:‘left’, justifyContent:‘flex-start’}}>
📎 {pdfName || (hasExistingPdf ? ‘PDF AL OPGESLAGEN — VERVANGEN…’ : ‘KIES PDF…’)}
</button>
<input ref={fileRef} type=“file” accept=”.pdf,application/pdf” style={{display:‘none’}}
onChange={e=> e.target.files[0] && handleFile(e.target.files[0])} />
</label>
)}
{!isBuiltinEdit && (
<p style={{fontSize:12, color:‘var(–muted)’, marginTop:4, lineHeight:1.4}}>
Max 4MB per PDF. Geen PDF? Geen probleem — het nummer komt wel in de bibliotheek en op de printlijst. In de PDF mét bladmuziek wordt het overgeslagen.
</p>
)}
{isBuiltinEdit && (
<p style={{fontSize:12, color:‘var(–muted)’, marginTop:4, lineHeight:1.4}}>
De PDF van dit ingebouwde nummer komt uit de Archief.zip en kan hier niet vervangen worden. Wil je een andere bladmuziek? Verwijder dit nummer en voeg het opnieuw toe als eigen nummer met een eigen PDF.
</p>
)}
{err && <div className="danger-text" style={{marginTop:12}}>{err}</div>}
</div>

try{ resultRef.current.scrollIntoView({behavior:‘smooth’, block:‘center’}); }catch(e){}
}
}, [pdfResult]);
function patch(p){ onUpdate({…setlist, …p, updatedAt: Date.now()}); }
function patchSets(sets){ patch({sets}); }
function updateSet(i, change){
const sets = setlist.sets.slice();
sets[i] = {…sets[i], …change};
patchSets(sets);
}
function addSet(){
const n = setlist.sets.length + 1;
patchSets([…setlist.sets, {id: uid(‘set’), name: ‘Set ‘+n, songs: []}]);

if(setlist.sets.length === 1){
showToast(‘Een setlist moet minstens 1 set hebben’);
return;

title: ‘SET VERWIJDEREN’,
message: ‘Wil je “’ + setlist.sets[i].name + ‘” verwijderen uit deze setlist?’,

});

patchSets(setlist.sets.filter((*,j)=> j!==i));
}

const sets = setlist.sets.slice();
const songs = sets[setIdx].songs.slice();
const ni = songIdx + dir;
if(ni < 0 || ni >= songs.length) return;
[songs[songIdx], songs[ni]] = [songs[ni], songs[songIdx]];
sets[setIdx] = {…sets[setIdx], songs};
patchSets(sets);
}

const sets = setlist.sets.slice();
const songs = sets[setIdx].songs.filter((*,j)=> j!==songIdx);
sets[setIdx] = {…sets[setIdx], songs};
patchSets(sets);
}

const sets = setlist.sets.slice();
sets[setIdx] = {…sets[setIdx], songs: […sets[setIdx].songs, …filenames]};
patchSets(sets);
setPicker(null);

/* ===== Zip Drop Modal ===== */
function ZipDropModal({onClose, onLoaded, status, setStatus}){
const [over, setOver] = useState(false);
const [err, setErr] = useState(’’);
const [progress, setProgress] = useState(0);
const inputRef = useRef(null);

async function handleFile(file){
if(!file) return;
setErr(’’);
setStatus(‘loading’);
try{
const JSZip = window.JSZip;
const ab = await file.arrayBuffer();
const zip = await JSZip.loadAsync(ab);
const pdfFiles = {};
const entries = Object.values(zip.files).filter(e => !e.dir && e.name.toLowerCase().endsWith(’.pdf’) && !e.name.includes(’__MACOSX’) && !e.name.split(’/’).pop().startsWith(’._’));
let done = 0;
for(const e of entries){
const bytes = await e.async(‘uint8array’);
// store under base name (matches SONGS filename)
const base = e.name.split(’/’).pop();
pdfFiles[base] = bytes;
done++;
if(done % 10 === 0) setProgress(done/entries.length);
}
setProgress(1);
onLoaded(pdfFiles);
}catch(e){
console.error(e);
setErr(‘Kon zip niet lezen: ’ + (e.message || e));
setStatus(‘idle’);
}
}
return (
<div className="modal-bg" onClick={onClose}>
<div className=“modal” style={{height:‘auto’, maxHeight:‘80vh’}} onClick={e=>e.stopPropagation()}>
<div className="modal-hdr">
<div className="modal-title">ZIP MET PDF’S LADEN</div>
<button className="btn btn-sm" onClick={onClose}>✕</button>
</div>
<div className="modal-body">
<p style={{marginTop:0}}>Sleep je <b>Archief.zip</b> hieronder (of tik om te kiezen). De zip blijft alleen in deze browsersessie — je setlijsten worden wel onthouden.</p>
<div
className={‘zip-box’ + (over ? ’ over’:’’)}
onClick={()=>inputRef.current && inputRef.current.click()}
onDragOver={e=>{e.preventDefault(); setOver(true);}}
onDragLeave={()=>setOver(false)}
onDrop={e=>{e.preventDefault(); setOver(false); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);}}
>

/* ===== PDF Generation ===== */
async function ensureFontsLoaded(){
try{
await Promise.all([
document.fonts.load(‘120px “Alfa Slab One”’),
document.fonts.load(‘72px “Bebas Neue”’),
document.fonts.load(‘32px “Special Elite”’),
document.fonts.load(‘60px “Limelight”’)
]);
await document.fonts.ready;
}catch(e){}
}

const A4_W = 595;  // pdf points
const A4_H = 842;
const CANVAS_SCALE = 2.5; // ≈ 180 dpi
const CW = Math.round(A4_W * CANVAS_SCALE);
const CH = Math.round(A4_H * CANVAS_SCALE);

function drawHalftoneDots(ctx, w, h, color, density){
ctx.fillStyle = color;
const step = density;
for(let y=0; y<h; y+=step){
for(let x=0; x<w; x+=step){
const r = step*0.18 + Math.random()*step*0.08;
ctx.beginPath();
ctx.arc(x + step*0.5, y + step*0.5, r, 0, Math.PI*2);
ctx.fill();
}
}
}

function drawBorder(ctx, w, h){
ctx.save();
// Outer thick black border
ctx.strokeStyle = ‘#1A1612’;
ctx.lineWidth = 22 * (CANVAS_SCALE/2.5);
ctx.strokeRect(28, 28, w-56, h-56);
// Inner red double border
ctx.strokeStyle = ‘#C2342A’;
ctx.lineWidth = 6 * (CANVAS_SCALE/2.5);
ctx.strokeRect(58, 58, w-116, h-116);
ctx.strokeRect(74, 74, w-148, h-148);
ctx.restore();
}

function drawCornerStar(ctx, x, y, r, color){
ctx.save();
ctx.translate(x,y);
ctx.fillStyle = color;
ctx.beginPath();
for(let i=0;i<10;i++){
const ang = (i/10)*Math.PI*2 - Math.PI/2;
const rad = i%2===0 ? r : r*0.45;
const px = Math.cos(ang)*rad, py = Math.sin(ang)*rad;
if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
}
ctx.closePath();
ctx.fill();
ctx.restore();
}

function wrapText(ctx, text, x, y, maxW, lineH){
const words = (text||’’).split(’ ‘);
let line = ‘’;
const lines = [];
for(const w of words){
const test = line ? line+’ ’+w : w;
if(ctx.measureText(test).width > maxW && line){
lines.push(line);
line = w;
} else {
line = test;
}
}
if(line) lines.push(line);
lines.forEach((ln, i) => ctx.fillText(ln, x, y + i*lineH));
return lines.length * lineH;
}

function drawCoverPage(setlist){
const c = document.createElement(‘canvas’);
c.width = CW; c.height = CH;
const ctx = c.getContext(‘2d’);
// Cream background
ctx.fillStyle = ‘#F4E8D0’;
ctx.fillRect(0,0,CW,CH);
// Halftone wash
ctx.globalAlpha = 0.06;
drawHalftoneDots(ctx, CW, CH, ‘#1A1612’, 28);
ctx.globalAlpha = 1;
// Borders
drawBorder(ctx, CW, CH);
// Corner stars
drawCornerStar(ctx, 120, 120, 36, ‘#C2342A’);
drawCornerStar(ctx, CW-120, 120, 36, ‘#C2342A’);
drawCornerStar(ctx, 120, CH-120, 36, ‘#C2342A’);
drawCornerStar(ctx, CW-120, CH-120, 36, ‘#C2342A’);
// Red ribbon at top with band name
const ribbonY = 200 * (CANVAS_SCALE/2.5);
const ribbonH = 130 * (CANVAS_SCALE/2.5);
ctx.fillStyle = ‘#C2342A’;
ctx.fillRect(100, ribbonY, CW-200, ribbonH);
ctx.fillStyle = ‘#1A1612’;
ctx.fillRect(100, ribbonY-10, CW-200, 8);
ctx.fillRect(100, ribbonY+ribbonH+2, CW-200, 8);
ctx.fillStyle = ‘#FFFAEC’;
ctx.font = ‘bold ’ + Math.round(64*CANVAS_SCALE/2.5) + ‘px “Bebas Neue”’;
ctx.textAlign = ‘center’;
ctx.textBaseline = ‘middle’;
ctx.fillText((setlist.bandName || ‘THE EXPLOSION ROCKETS’).toUpperCase(), CW/2, ribbonY + ribbonH/2);
// “SETLIST” giant header
ctx.fillStyle = ‘#1A1612’;
ctx.font = Math.round(220*CANVAS_SCALE/2.5) + ‘px “Alfa Slab One”’;
ctx.textBaseline = ‘top’;
const setlistY = ribbonY + ribbonH + 50;
// Drop-shadow effect
ctx.fillStyle = ‘#C2342A’;
ctx.fillText(‘SETLIST’, CW/2 + 8, setlistY + 8);
ctx.fillStyle = ‘#1A1612’;
ctx.fillText(‘SETLIST’, CW/2, setlistY);
// Subtitle: setlist.name
ctx.fillStyle = ‘#1A1612’;
ctx.font = Math.round(38*CANVAS_SCALE/2.5) + ‘px “Special Elite”’;
const nameY = setlistY + Math.round(220*CANVAS_SCALE/2.5) + 30;
const nameH = wrapText(ctx, setlist.name || ‘’, CW/2, nameY, CW-300, Math.round(48*CANVAS_SCALE/2.5));
// Stars divider
ctx.fillStyle = ‘#C2342A’;
ctx.font = Math.round(40*CANVAS_SCALE/2.5) + ‘px “Bebas Neue”’;
const starY = nameY + nameH + 18;
ctx.fillText(‘★    ★    ★’, CW/2, starY);
// Date + location
ctx.fillStyle = ‘#1A1612’;
ctx.font = Math.round(48*CANVAS_SCALE/2.5) + ‘px “Bebas Neue”’;
const dateY = starY + Math.round(70*CANVAS_SCALE/2.5);
ctx.fillText(fmtDate(setlist.date), CW/2, dateY);
if(setlist.location){
ctx.font = Math.round(34*CANVAS_SCALE/2.5) + ‘px “Bebas Neue”’;
wrapText(ctx, setlist.location.toUpperCase(), CW/2, dateY + Math.round(60*CANVAS_SCALE/2.5), CW-300, Math.round(42*CANVAS_SCALE/2.5));
}
// Bottom signature
ctx.fillStyle = ‘#8C2820’;
ctx.font = Math.round(22*CANVAS_SCALE/2.5) + ‘px “Special Elite”’;
ctx.fillText(’— ROCK ★ N ★ ROLL —’, CW/2, CH - 175);
ctx.fillStyle = ‘#1A1612’;
ctx.font = Math.round(16*CANVAS_SCALE/2.5) + ‘px “Bebas Neue”’;
const totalSongs = setlist.sets.reduce((n,s)=>n+s.songs.length,0);
ctx.fillText(setlist.sets.length + ’ SETS · ’ + totalSongs + ’ NUMMERS’, CW/2, CH - 140);
return c;
}

function drawSetDividerPage(setlist, set, setIndex, totalSets){
const c = document.createElement(‘canvas’);
c.width = CW; c.height = CH;
const ctx = c.getContext(‘2d’);
ctx.fillStyle = ‘#F4E8D0’;
ctx.fillRect(0,0,CW,CH);
ctx.globalAlpha = 0.05;
drawHalftoneDots(ctx, CW, CH, ‘#1A1612’, 26);
ctx.globalAlpha = 1;
// Diagonal red stripes top + bottom
ctx.save();
ctx.translate(CW/2, 200);
ctx.rotate(-0.04);
ctx.fillStyle = ‘#C2342A’;
ctx.fillRect(-CW, -28, 2*CW, 56);
ctx.fillStyle = ‘#1A1612’;
ctx.fillRect(-CW, -38, 2*CW, 8);
ctx.fillRect(-CW, 30, 2*CW, 8);
ctx.restore();
// SET number — massive
ctx.fillStyle = ‘#1A1612’;
ctx.textAlign = ‘center’;
ctx.textBaseline = ‘middle’;
ctx.font = Math.round(160*CANVAS_SCALE/2.5) + ‘px “Bebas Neue”’;
ctx.fillText(‘SET ’ + (setIndex+1), CW/2, CH*0.42);
ctx.font = Math.round(380*CANVAS_SCALE/2.5) + ‘px “Alfa Slab One”’;
// huge numeral with red offset
ctx.fillStyle = ‘#C2342A’;
ctx.fillText(String(setIndex+1), CW/2 + 14, CH*0.58 + 14);
ctx.fillStyle = ‘#1A1612’;
ctx.fillText(String(setIndex+1), CW/2, CH*0.58);
// Set name (if differs from default)
const defaultName = ‘Set ’ + (setIndex+1);
if(set.name && set.name !== defaultName){
ctx.fillStyle = ‘#1A1612’;
ctx.font = Math.round(40*CANVAS_SCALE/2.5) + ‘px “Special Elite”’;
wrapText(ctx, ‘”’+set.name+’”’, CW/2, CH*0.78, CW-300, Math.round(52*CANVAS_SCALE/2.5));
}
// Footer: setlist + date
ctx.save();
ctx.translate(CW/2, CH-200);
ctx.fillStyle = ‘#1A1612’;
ctx.font = Math.round(20*CANVAS_SCALE/2.5) + ‘px “Bebas Neue”’;
ctx.fillText((setlist.bandName||’’).toUpperCase() + ’ · ’ + fmtDate(setlist.date), 0, 0);
if(setlist.location){
ctx.font = Math.round(18*CANVAS_SCALE/2.5) + ‘px “Bebas Neue”’;
ctx.fillStyle = ‘#8C2820’;
wrapText(ctx, setlist.location.toUpperCase(), 0, 30, CW-200, 28);
}
ctx.restore();
ctx.fillStyle = ‘#C2342A’;
ctx.font = Math.round(28*CANVAS_SCALE/2.5) + ‘px “Bebas Neue”’;
ctx.fillText(set.songs.length + ’ NUMMERS · SET ’ + (setIndex+1) + ’ VAN ’ + totalSets, CW/2, CH-120);
// Side stars
drawCornerStar(ctx, 130, CH/2, 26, ‘#C2342A’);
drawCornerStar(ctx, CW-130, CH/2, 26, ‘#C2342A’);
return c;
}

async function canvasToPngBytes(canvas){
const blob = await new Promise(res => canvas.toBlob(res, ‘image/jpeg’, 0.88));
const buf = await blob.arrayBuffer();
return new Uint8Array(buf);
}

async function generateTextListPdf(setlist, allSongs){
const PDFLib = window.PDFLib;
const out = await PDFLib.PDFDocument.create();
const helv     = await out.embedFont(PDFLib.StandardFonts.Helvetica);
const helvB    = await out.embedFont(PDFLib.StandardFonts.HelveticaBold);
const helvI    = await out.embedFont(PDFLib.StandardFonts.HelveticaOblique);

const PAGE_W = 595, PAGE_H = 842;
const MX_L = 50, MX_R = 50;
const MY_T = 50, MY_B = 40;
const LINE_H = 32;          // chosen so ~20 songs fit per page with larger titles
const SONGS_PER_PAGE = 20;

const cBlack = PDFLib.rgb(0, 0, 0);
const cRed   = PDFLib.rgb(0.76, 0.20, 0.16);
const cInk   = PDFLib.rgb(0.23, 0.20, 0.16);
const cMute  = PDFLib.rgb(0.48, 0.43, 0.36);

function fitText(text, maxW, font, size){
if(font.widthOfTextAtSize(text, size) <= maxW) return text;
const ell = ‘…’;
let lo=0, hi=text.length;
while(lo<hi){
const mid = (lo+hi+1)>>1;
if(font.widthOfTextAtSize(text.slice(0,mid)+ell, size) <= maxW) lo=mid;
else hi=mid-1;
}
return text.slice(0, lo) + ell;
}
function drawHeader(page, set, setIdx, totalSets, pageIdx, pagesInSet){
const topY = PAGE_H - MY_T;
// Band name (left)
const band = sanitizeForPdf((setlist.bandName || ‘The Explosion Rockets’).toUpperCase());
page.drawText(band, { x: MX_L, y: topY, size: 14, font: helvB, color: cBlack });
// Set info (right)
const setLabel = ‘SET ’ + (setIdx+1) + ’ / ’ + totalSets;
const slW = helvB.widthOfTextAtSize(setLabel, 14);
page.drawText(setLabel, { x: PAGE_W - MX_R - slW, y: topY, size: 14, font: helvB, color: cRed });
// Subtitle line
const subY = topY - 14;
const subParts = [];
if(setlist.date)     subParts.push(sanitizeForPdf(fmtDate(setlist.date)));
if(setlist.location) subParts.push(sanitizeForPdf(setlist.location));
if(subParts.length){
page.drawText(subParts.join(’  ·  ’),
{ x: MX_L, y: subY, size: 9, font: helv, color: cInk });
}
if(pagesInSet > 1){
const pg = ‘pagina ’ + (pageIdx+1) + ’ / ’ + pagesInSet;
const pgW = helv.widthOfTextAtSize(pg, 9);
page.drawText(pg, { x: PAGE_W - MX_R - pgW, y: subY, size: 9, font: helv, color: cMute });
}
// Divider line
page.drawLine({
start: { x: MX_L, y: subY - 10 },
end:   { x: PAGE_W - MX_R, y: subY - 10 },
thickness: 1, color: cBlack
});
// Setlist + set name (first page of set only)
let nextY = subY - 28;
if(pageIdx === 0){
const slName = sanitizeForPdf(setlist.name || ‘’);
if(slName){
page.drawText(slName, { x: MX_L, y: nextY, size: 11, font: helvI, color: cInk });
nextY -= 18;
}
const defName = ‘Set ’ + (setIdx+1);
if(set.name && set.name !== defName){
const sn = sanitizeForPdf(’”’ + set.name + ‘”’);
page.drawText(sn, { x: MX_L, y: nextY, size: 11, font: helvI, color: cMute });
nextY -= 18;
}
}
return nextY;
}

for(let setIdx=0; setIdx<setlist.sets.length; setIdx++){
const set = setlist.sets[setIdx];
const songs = set.songs;
const pagesInSet = Math.max(1, Math.ceil(songs.length / SONGS_PER_PAGE));
for(let pageIdx=0; pageIdx<pagesInSet; pageIdx++){
const page = out.addPage([PAGE_W, PAGE_H]);
let y = drawHeader(page, set, setIdx, setlist.sets.length, pageIdx, pagesInSet);
// Numbered list
const startSong = pageIdx * SONGS_PER_PAGE;
const endSong = Math.min(songs.length, startSong + SONGS_PER_PAGE);
for(let i=startSong; i<endSong; i++){
const fn = songs[i];
const song = allSongs.find(x => x.filename === fn);
const title  = sanitizeForPdf(song ? song.title : ‘(onbekend)’).toUpperCase();
const artist = sanitizeForPdf(song ? song.artist : fn);
// Number column: right-aligned at x=80
const numStr = (i+1) + ‘.’;
const numW = helv.widthOfTextAtSize(numStr, 11);
page.drawText(numStr, { x: 80 - numW, y: y, size: 11, font: helv, color: cMute });
// Artist column: right-aligned at right margin, max width 180
const artistFit = fitText(artist, 180, helv, 11);
const artistW = helv.widthOfTextAtSize(artistFit, 11);
page.drawText(artistFit, { x: PAGE_W - MX_R - artistW, y: y, size: 11, font: helv, color: cInk });
// Title column: between number and artist, bold, ALL CAPS, larger for stage readability
const titleMaxX = PAGE_W - MX_R - artistW - 16;
const titleMaxW = titleMaxX - 90;
const titleFit = fitText(title, titleMaxW, helvB, 17);
page.drawText(titleFit, { x: 90, y: y, size: 17, font: helvB, color: cBlack });
y -= LINE_H;
}
// Footer
if(pageIdx === pagesInSet-1){
const foot = ‘— ’ + songs.length + (songs.length===1 ? ’ nummer —’ : ’ nummers —’);
const footW = helvI.widthOfTextAtSize(foot, 9);
page.drawText(foot, { x: (PAGE_W - footW)/2, y: MY_B, size: 9, font: helvI, color: cMute });
}
}
}
return await out.save();
}

async function generateCombinedPdf(setlist, zipFiles, allSongs, onProgress){
await ensureFontsLoaded();
const PDFLib = window.PDFLib;
const out = await PDFLib.PDFDocument.create();
// === Cover ===
onProgress && onProgress(0.05, ‘Voorblad tekenen…’);
const coverCanvas = drawCoverPage(setlist);
const coverBytes = await canvasToPngBytes(coverCanvas);
const coverImg = await out.embedJpg(coverBytes);
const coverPage = out.addPage([A4_W, A4_H]);
coverPage.drawImage(coverImg, {x:0,y:0,width:A4_W,height:A4_H});

const totalSteps = setlist.sets.reduce((n,s)=> n + s.songs.length + 1, 0);
let done = 0;
// === Sets ===
for(let i=0; i<setlist.sets.length; i++){
const set = setlist.sets[i];
onProgress && onProgress(0.05 + 0.9*(done/totalSteps), ’Tussenblad set ’ + (i+1) + ‘…’);
const divCanvas = drawSetDividerPage(setlist, set, i, setlist.sets.length);
const divBytes = await canvasToPngBytes(divCanvas);
const divImg = await out.embedJpg(divBytes);
const divPage = out.addPage([A4_W, A4_H]);
divPage.drawImage(divImg, {x:0,y:0,width:A4_W,height:A4_H});
done++;
for(const fn of set.songs){
onProgress && onProgress(0.05 + 0.9*(done/totalSteps), ’Voeg toe: ’ + fn);
const song = allSongs.find(x => x.filename === fn);
// Custom songs flagged as no-PDF: skip silently
if(song && song.custom && song.hasPdf === false){
done++;
continue;
}
let bytes = zipFiles[fn];
// Custom songs: try loading from persistent storage if not in session
if(!bytes && isCustomFilename(fn)){
const cid = customIdFromFilename(fn);
if(cid){
bytes = await loadCustomPdfBytes(cid);
if(bytes) zipFiles[fn] = bytes; // cache for the rest of this session
}
}
if(!bytes){
console.warn(‘Missing PDF:’, fn);
const label = song ? (song.title + ’ — ’ + song.artist) : fn;
const ph = out.addPage([A4_W, A4_H]);
ph.drawText(’ONTBREEKT: ’ + label, {x:60, y:A4_H/2, size:14});
done++;
continue;
}
try{
const src = await PDFLib.PDFDocument.load(bytes, {ignoreEncryption:true});
const pages = await out.copyPages(src, src.getPageIndices());
pages.forEach(p => out.addPage(p));
}catch(e){
console.error(‘Failed to embed’, fn, e);
const ph = out.addPage([A4_W, A4_H]);
ph.drawText(’Fout bij laden: ’ + fn, {x:60, y:A4_H/2, size:14});
}
done++;
}
}
onProgress && onProgress(0.97, ‘PDF opslaan…’);
const bytes = await out.save();
onProgress && onProgress(1.0, ‘Klaar’);
return bytes;
}

function safeFilename(s){
return (s||‘setlist’).replace(/[^a-zA-Z0-9 -*.]/g,’’).replace(/\s+/g,’*’).slice(0,80);
}
function bytesToBlobUrl(bytes){
const blob = new Blob([bytes], {type:‘application/pdf’});
return URL.createObjectURL(blob);
}
async function bytesToDataUrlAsync(bytes){
return new Promise((resolve, reject) => {
const blob = new Blob([bytes], {type:‘application/pdf’});
const r = new FileReader();
r.onload = () => resolve(r.result);
r.onerror = () => reject(r.error || new Error(‘FileReader error’));
r.readAsDataURL(blob);
});
}
function tryAutoDownload(url, filename){
// Best-effort: works on most desktop browsers, often silently fails on iOS/sandboxed iframes.
// The persistent result card below remains the reliable path.
try{
const a = document.createElement(‘a’);
a.href = url; a.download = filename; a.rel = ‘noopener’;
document.body.appendChild(a); a.click();
setTimeout(()=> a.remove(), 600);
}catch(e){ /* ignore */ }
}

function canShareFiles(){
try{
if(typeof navigator === ‘undefined’ || !navigator.canShare) return false;
const probe = new File([new Uint8Array([0x25,0x50,0x44,0x46])], ‘probe.pdf’, {type:‘application/pdf’});
return navigator.canShare({files: [probe]});
}catch(e){ return false; }
}
async function shareViaSystem(pdfResult, showToast){
if(!pdfResult || !pdfResult.bytes){
showToast && showToast(‘Geen PDF om te delen’, 2500);
return;
}
try{
const file = new File([pdfResult.bytes], pdfResult.filename, {type:‘application/pdf’});
if(navigator.canShare && navigator.canShare({files: [file]})){
await navigator.share({files: [file], title: pdfResult.filename});
} else if(navigator.share){
await navigator.share({title: pdfResult.filename, url: pdfResult.url});
} else {
showToast && showToast(‘Delen niet beschikbaar in deze browser’, 3000);
}
}catch(e){
if(e.name === ‘AbortError’) return; // user cancelled
console.error(‘share failed’, e);
showToast && showToast(’Delen mislukt: ’ + (e.message || e), 3500);
}
}

setStorageType(getStorageBackend());
if(works){
const [sl, cs, ov, sc] = await Promise.all([
loadSetlists(), loadCustomSongs(), loadSongOverrides(), loadSyncConfig()
]);
setSetlists(sl);
setCustomSongs(cs);
setSongOverrides(ov);
// Determine effective sync config:
// 1) explicit user opt-out → no sync
// 2) user custom credentials → use those
// 3) baked default (if filled in) → use that
// 4) nothing → no sync
if(sc && sc.disabled){
setSyncConfig(null);
} else if(sc && sc.binId && sc.accessKey){
setSyncConfig(sc);
} else {
const baked = getDefaultSyncConfig();
if(baked) setSyncConfig(baked);
}
} else {
// No storage = no persisted opt-out check; still apply baked if present
const baked = getDefaultSyncConfig();
if(baked) setSyncConfig(baked);
}
setLoaded(true);
})();
}, []);
// Save on change
useEffect(()=>{
if(loaded) saveSetlistsDebounced(setlists);
}, [setlists, loaded]);
useEffect(()=>{
if(loaded) saveCustomSongsDebounced(customSongs);
}, [customSongs, loaded]);
useEffect(()=>{
if(loaded) saveSongOverridesDebounced(songOverrides);
}, [songOverrides, loaded]);

function showToast(msg, ms=2400){
setToast(msg);
setTimeout(()=> setToast(t => t === msg ? null : t), ms);
}

/* ===== Sync handlers ===== */
async function doPullAndApply(silent){
if(!syncConfig || !syncConfig.binId) return;
setSyncStatus(s => ({…s, state:‘syncing’, error:null}));
try{
const data = await pullFromJsonBin(syncConfig.binId, syncConfig.accessKey);
// If bin doesn’t contain our v=1 payload yet (empty, placeholder, or wrong schema)
// treat as uninitialized and push local data so the bin gets seeded.
if(!isValidPayload(data)){
setSyncStatus({state:‘ok’, lastSyncAt: Date.now(), error:null});
lastSyncedHashRef.current = null;
setTimeout(() => doPush(true), 400);
if(!silent) showToast(‘Cloud nog niet geïnitialiseerd — lokale data wordt geüpload’, 2400);
return;
}
applyingPullRef.current = true;
setSetlists(data.setlists);
setCustomSongs(data.customSongs);
setSongOverrides(data.songOverrides);
lastSyncedHashRef.current = syncHash(data);
// Reset apply-flag after React commits
setTimeout(() => { applyingPullRef.current = false; }, 50);
setSyncStatus({state:‘ok’, lastSyncAt: Date.now(), error:null});
if(!silent) showToast(‘Cloud opgehaald ✓’, 1800);
}catch(e){
console.error(‘Pull failed’, e);
setSyncStatus({state:‘error’, lastSyncAt: syncStatus.lastSyncAt, error: e.message || String(e)});
if(!silent) showToast(’Pull mislukt: ’ + (e.message || e), 3500);
}
}
async function doPush(silent){
if(!syncConfig || !syncConfig.binId) return;
if(applyingPullRef.current) return;
const payload = makeSyncPayload(setlists, customSongs, songOverrides);
const h = syncHash(payload);
if(h === lastSyncedHashRef.current && silent) return; // nothing to push
setSyncStatus(s => ({…s, state:‘syncing’, error:null}));
try{
await pushToJsonBin(syncConfig.binId, syncConfig.accessKey, payload);
lastSyncedHashRef.current = h;
setSyncStatus({state:‘ok’, lastSyncAt: Date.now(), error:null});
if(!silent) showToast(‘Naar cloud verzonden ✓’, 1800);
}catch(e){
console.error(‘Push failed’, e);
setSyncStatus({state:‘error’, lastSyncAt: syncStatus.lastSyncAt, error: e.message || String(e)});
if(!silent) showToast(‘Push mislukt: ’ + (e.message || e), 3500);
}
}
async function handleSyncConfigSave(newCfg){
setSyncConfig(newCfg);
await saveSyncConfig(newCfg);
initialPullDoneRef.current = false; // trigger a fresh pull
lastSyncedHashRef.current = null;
// doPullAndApply triggers via effect below once state settles
}
async function handleSyncDisconnect(){
const ok = await askConfirm({
title: ‘SYNC VERBREKEN’,
message: ‘Cloud-verbinding verbreken op dit apparaat? Je lokale data blijft staan en sync staat uit totdat je hem zelf weer aanzet.’,
confirmLabel: ‘VERBREKEN’,
danger: true
});
if(!ok) return;
setSyncConfig(null);
// Save opt-out so baked default doesn’t re-activate on next load
await saveSyncConfig({disabled: true});
setSyncStatus({state:‘idle’, lastSyncAt:null, error:null});
initialPullDoneRef.current = false;
lastSyncedHashRef.current = null;
setShowSyncModal(false);
showToast(‘Cloud-sync uit’, 1800);
}
async function handleResetToDefault(){
const baked = getDefaultSyncConfig();
if(!baked){
showToast(‘Geen standaard-cloud ingesteld’, 2400);
return;
}
setSyncConfig(baked);
await saveSyncConfig(null); // clear user override → falls back to baked
initialPullDoneRef.current = false;
lastSyncedHashRef.current = null;
showToast(‘Teruggezet naar standaard-cloud’, 1800);
}

// Auto-pull once on load (or when config changes)
useEffect(() => {
if(!loaded || !syncConfig || !syncConfig.enabled) return;
if(initialPullDoneRef.current) return;
initialPullDoneRef.current = true;
doPullAndApply(true);
}, [loaded, syncConfig && syncConfig.binId, syncConfig && syncConfig.accessKey, syncConfig && syncConfig.enabled]);

// Auto-push debounced after data changes
useEffect(() => {
if(!loaded || !syncConfig || !syncConfig.enabled) return;
if(applyingPullRef.current) return;
if(!initialPullDoneRef.current) return; // wait until first pull settled
const t = setTimeout(() => doPush(true), 2500);
return () => clearTimeout(t);
}, [setlists, customSongs, songOverrides]);

function createSetlist(){
const sl = emptySetlist();
setSetlists(prev => [sl, …prev]);
setActiveId(sl.id);
}
async function deleteSetlist(id){
const sl = setlists.find(x => x.id === id);
const ok = await askConfirm({
title: ‘SETLIST VERWIJDEREN’,
message: ‘Wil je “’ + (sl && sl.name || ‘deze setlist’) + ‘” definitief verwijderen?’,
confirmLabel: ‘VERWIJDEREN’,
danger: true
});
if(!ok) return;
setSetlists(prev => prev.filter(s => s.id !== id));
if(activeId === id) setActiveId(null);
showToast(‘Setlist verwijderd’);
}
function updateSetlist(updated){
setSetlists(prev => prev.map(s => s.id === updated.id ? updated : s));
}
async function saveCustomSong({title, artist, pdfBytes, editing}){
if(editing && !editing.custom){
// Editing a built-in song: only update title/artist via overrides
setSongOverrides(prev => ({
…prev,
edits: {
…prev.edits,
[editing.filename]: {title, artist}
}
}));
setAddSongModal(null);
showToast(‘Nummer bijgewerkt ✓’);
return;
}
if(editing){
// Update custom song; optionally replace PDF
const updated = {…editing, title, artist};
if(pdfBytes){
updated.hasPdf = true;
const id = customIdFromFilename(editing.filename);
await saveCustomPdfBase64(id, bytesToBase64(pdfBytes));
setZipFiles(prev => ({…prev, [editing.filename]: pdfBytes}));
}
setCustomSongs(prev => prev.map(s => s.id === editing.id ? updated : s));
setAddSongModal(null);
showToast(‘Nummer bijgewerkt ✓’);
} else {
const song = makeCustomSong({title, artist, hasPdf: !!pdfBytes});
if(pdfBytes){
const id = customIdFromFilename(song.filename);
await saveCustomPdfBase64(id, bytesToBase64(pdfBytes));
setZipFiles(prev => ({…prev, [song.filename]: pdfBytes}));
}
setCustomSongs(prev => [song, …prev]);
setAddSongModal(null);
showToast(pdfBytes ? ‘Nummer toegevoegd ✓’ : ‘Nummer toegevoegd (zonder PDF) ✓’);
}
}
async function deleteSong(song){
const ok = await askConfirm({
title: ‘NUMMER VERWIJDEREN’,
message: ‘Wil je “’ + song.title + ‘” verwijderen uit de bibliotheek?\n\nBestaande setlijsten die dit nummer gebruiken laten het dan als “Onbekend nummer” zien — je kunt het later herstellen.’,
confirmLabel: ‘VERWIJDEREN’,
danger: true
});
if(!ok) return;
if(song.custom){
const id = customIdFromFilename(song.filename);
setCustomSongs(prev => prev.filter(s => s.id !== song.id));
if(id) await deleteCustomPdf(id);
setZipFiles(prev => {
const c = {…prev};
delete c[song.filename];
return c;
});
} else {
setSongOverrides(prev => ({
…prev,
deleted: prev.deleted.filter(f => f !== song.filename).concat([song.filename])
}));
}
showToast(‘Verwijderd ✓’);
}
function restoreSong(filename){
setSongOverrides(prev => ({
…prev,
deleted: prev.deleted.filter(f => f !== filename)
}));
showToast(‘Hersteld ✓’);
}
async function restoreAllHidden(){
if((songOverrides.deleted || []).length === 0) return;
const ok = await askConfirm({
title: ‘ALLES HERSTELLEN’,
message: ‘Alle ’ + songOverrides.deleted.length + ’ verwijderde ingebouwde nummers terugzetten?’,
confirmLabel: ‘HERSTEL ALLES’
});
if(!ok) return;
setSongOverrides(prev => ({…prev, deleted: []}));
showToast(‘Alles hersteld ✓’);
}
function handleZipLoaded(files){
setZipFiles(prev => ({…prev, …files}));  // keep custom songs already loaded
setZipStatus(‘loaded’);
setShowZip(false);
const found = Object.keys(files).length;
showToast(‘Zip geladen: ’ + found + ’ PDF's’, 1800);
// If we were waiting to generate PDF, kick it off
if(pendingPdf){
setPendingPdf(false);
setTimeout(()=> doGenerate({…zipFiles, …files}), 200);
}
}
function setlistNeedsZip(setlist){
// Only true if at least one song in setlist isn’t a custom song (i.e., comes from the archive zip)
for(const set of setlist.sets){
for(const fn of set.songs){
if(!isCustomFilename(fn)) return true;
}
}
return false;
}
function requestFullPdf(){
const active = setlists.find(s => s.id === activeId);
if(!active) return;
const needsZip = setlistNeedsZip(active);
if(needsZip && (zipStatus !== ‘loaded’ || Object.keys(zipFiles).length === 0)){
setPendingPdf(true);
setShowZip(true);
return;
}
doGenerate(zipFiles);
}
async function requestTextPdf(){
const active = setlists.find(s => s.id === activeId);
if(!active) return;
setGenerating(true);
setPdfLabel(‘PRINTLIJST MAKEN…’);
setPdfProgress(0.3);
try{
await new Promise(r => setTimeout(r, 30));
const bytes = await generateTextListPdf(active, allSongs);
setPdfProgress(1);
const fn = safeFilename(active.name) + ‘_’ + (active.date||’’) + ‘*lijst.pdf’;
const url = bytesToBlobUrl(bytes);
let dataUrl = null;
try{ dataUrl = await bytesToDataUrlAsync(bytes); }catch(e){}
setPdfResultAndCleanup({url, dataUrl, bytes, filename: fn, label: ‘PRINTLIJST’});
tryAutoDownload(url, fn);
showToast(‘Printlijst gereed ✓’, 2200);
}catch(e){
console.error(e);
showToast(‘Fout: ’ + (e.message || e), 4500);
}finally{
setGenerating(false);
setPdfProgress(0);
setPdfLabel(’’);
}
}
async function doGenerate(files){
const active = setlists.find(s => s.id === activeId);
if(!active) return;
setGenerating(true);
setPdfLabel(‘PDF MET BLADMUZIEK SAMENSTELLEN…’);
setPdfProgress(0);
try{
const bytes = await generateCombinedPdf(active, files, allSongs, (p, msg) => {
setPdfProgress(p);
});
const fn = safeFilename(active.name) + ’*’ + (active.date||’’) + ‘.pdf’;
const url = bytesToBlobUrl(bytes);
let dataUrl = null;
try{ dataUrl = await bytesToDataUrlAsync(bytes); }catch(e){}
setPdfResultAndCleanup({url, dataUrl, bytes, filename: fn, label: ‘PDF MET BLADMUZIEK’});
tryAutoDownload(url, fn);
showToast(‘PDF gereed ✓’, 2200);
}catch(e){
console.error(e);
showToast(‘Fout: ’ + (e.message || e), 4500);
}finally{
setGenerating(false);
setPdfProgress(0);
setPdfLabel(’’);
}
}

const active = activeId ? setlists.find(s => s.id === activeId) : null;
const zipCount = Object.keys(zipFiles).length;

return (
<div className="app">
<Header
view={view} setView={(v)=>{setView(v); setActiveId(null);}}
zipStatus={zipStatus} zipCount={zipCount}
onZipClick={()=> setShowZip(true)}
hasActive={!!active}
onBack={()=> setActiveId(null)}
syncEnabled={!!(syncConfig && syncConfig.enabled)}
syncState={syncStatus.state}
onSyncClick={()=> setShowSyncModal(true)}
/>
{storageAvailable === false && (
<div className="preview-warning">
<div className="preview-warning-title">⚠ OPSLAG NIET BESCHIKBAAR</div>
<div className="preview-warning-text">
Setlijsten worden niet bewaard tussen sessies. Open de app in een normale browser (geen privé-modus) of host hem op een eigen URL.
</div>
</div>
)}
{active ? (
<EditorView
setlist={active}
songs={allSongs}
onUpdate={updateSetlist}
onRequestFullPdf={requestFullPdf}
onRequestTextPdf={requestTextPdf}
onAddSong={()=> setAddSongModal({editing: null})}
generatingPdf={generating}
pdfProgress={pdfProgress}
pdfLabel={pdfLabel}
pdfResult={pdfResult}
onDismissPdfResult={()=> setPdfResultAndCleanup(null)}
askConfirm={askConfirm}
showToast={showToast}
/>
) : view === ‘setlists’ ? (
<SetlistsView
setlists={setlists}
onOpen={setActiveId}
onCreate={createSetlist}
onDelete={deleteSetlist}
/>
) : (
<LibraryView
songs={visibleSongs}
hiddenCount={hiddenCount}
hiddenSongs={allSongs.filter(s => s.deleted)}
onAddSong={()=> setAddSongModal({editing: null})}
onEditSong={(song)=> setAddSongModal({editing: song})}
onDeleteSong={deleteSong}
onRestoreSong={restoreSong}
onRestoreAll={restoreAllHidden}
/>
)}
{showZip && (
<ZipDropModal
status={zipStatus}
setStatus={setZipStatus}
onClose={()=>{ setShowZip(false); setPendingPdf(false); if(zipStatus===‘loading’) setZipStatus(‘idle’); }}
onLoaded={handleZipLoaded}
/>
)}
{addSongModal && (
<AddSongModal
editing={addSongModal.editing}
onClose={()=> setAddSongModal(null)}
onSave={saveCustomSong}
/>
)}
{confirmDialog && (
<ConfirmModal {…confirmDialog} />
)}
{showSyncModal && (
<SyncSettingsModal
config={syncConfig}
hasBakedDefault={!!getDefaultSyncConfig()}
status={syncStatus}
onClose={()=> setShowSyncModal(false)}
onSave={handleSyncConfigSave}
onDisconnect={handleSyncDisconnect}
onReset={handleResetToDefault}
onPullNow={()=> doPullAndApply(false)}
onPushNow={()=> doPush(false)}
showToast={showToast}
/>
)}
{toast && <div className="toast">{toast}</div>}
</div>
);
}

const root = ReactDOM.createRoot(document.getElementById(‘root’));
root.render(<App />);
</script>

</body>
</html>
